spring.application.name=fitme

# Auto-load local .env file (key=value) when running from IDE or mvn/java directly.
spring.config.import=optional:file:.env[.properties]

# AWS Cognito Configuration
# Replace with your actual User Pool ID and Region
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_9AoKPqZO1}

# Optional: Verify audience (Client ID)
# spring.security.oauth2.resourceserver.jwt.audiences={clientId}

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ===============================
# FLYWAY MIGRATION
# ===============================
spring.flyway.enabled=true

spring.datasource.hikari.initialization-fail-timeout=0

# ===============================
# AWS S3 Configuration
# ===============================
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
cloud.aws.region.static=${AWS_REGION:ap-southeast-1}
aws.s3.bucket=${S3_BUCKET_NAME:crawl.fitness}

# ===============================
# CloudFront CDN Configuration
# ===============================
cloudfront.domain=${CLOUDFRONT_DOMAIN:d2yt5fbztmr4b9.cloudfront.net}

# API Key for Bedrock (Direct REST access)
aws.bedrock.api-key=${BEDROCK_API_KEY}

# Model ID for Claude models on Bedrock
# Options:
#   - anthropic.claude-3-5-haiku-20241022-v1:0 (recommended - fastest & cheapest)
#   - anthropic.claude-3-sonnet-20240229 (balanced)
#   - anthropic.claude-3-opus-20240229 (most capable, slower)
aws.bedrock.model=${BEDROCK_MODEL:anthropic.claude-3-5-haiku-20241022-v1:0}
aws.bedrock.region=${BEDROCK_REGION:us-west-2}
aws.bedrock.temperature=${BEDROCK_TEMPERATURE:0.7}
aws.bedrock.max-tokens=${BEDROCK_MAX_TOKENS:1024}